<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | BIKIzz Classes</title>
    
    <!-- CSS and Fonts (Same as Login) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<div class="login-wrapper">
    <!-- Right Side: Translucent Glassmorphism Register Card -->
    <div class="form-container">
        <div class="login-card">
            <!-- Branded Logo with Pulse Effect -->
            <img src="{{ url_for('static', filename='images/logo.png') }}" class="card-logo" alt="Logo">
            
            <h2>Create Account 🚀</h2>
            <p class="subtitle">Join us to start your learning journey.</p>

            <!-- Flask Flash Messages -->
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="flash-messages">
                {% for message in messages %}
                <div class="flash {% if 'Successful' in message or 'Success' in message %}success{% else %}error{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <!-- Register Form -->
            <form action="/register" method="POST" id="registerForm">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <!-- Full Name -->
                <div class="input-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="name" placeholder="Full Name" required>
                </div>

                <!-- Mobile Number -->
                <div class="input-box">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" name="mobile" placeholder="Mobile Number" pattern="[0-9]{10}" maxlength="10" required>
                </div>

                <!-- Email Address -->
                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>

                <!-- Password -->
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <span class="toggle-password" style="cursor: pointer;">
                        <i class="fa-solid fa-eye-slash" id="eyeIcon"></i>
                    </span>
                </div>

                <!-- Register Button with Loader -->
                <button type="submit" class="login-btn" id="loginBtn">
                    <span id="btnText">Register</span>
                    <span id="btnLoader" style="display:none;">
                        <i class="fa-solid fa-spinner fa-spin"></i> Creating Account...
                    </span>
                </button>
            </form>

            <!-- Links -->
            <div class="links" style="justify-content: center; gap: 8px;">
                <span style="color: #94a3b8;">Already have an account?</span>
                <a href="/login" style="color: #00b4d8; font-weight: 500;">Login</a>
            </div>
        </div>
    </div>
</div>

<!-- Animated Background Elements -->
<div class="floating-bg">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="cursor-glow"></div>

<!-- JavaScript File (Same functionality works here) -->
<script src="{{ url_for('static', filename='auth.js') }}"></script>

</body>
</html>
