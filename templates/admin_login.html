<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BIKIzz Admin Login</title>
{% include 'pwa_head.html' %}

<link rel="stylesheet" href="{{ url_for('static', filename='admin_login.css') }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="login-box">

<img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">

<h1>BIKIzz Admin Panel</h1>

<p>Secure Login Portal</p>

<form method="POST">
<input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input type="email"
name="email"
placeholder="Admin Email"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
name="password"
placeholder="Password"
required>

<i class="fa-solid fa-eye eye"
onclick="togglePassword()"></i>

</div>

<button type="submit">

Login to Dashboard

</button>

</form>

<a href="/" class="back-btn">

← Back to Website

</a>

</div>

<script>

function togglePassword(){

let password=document.getElementById("password");

if(password.type==="password"){

password.type="text";

}else{

password.type="password";

}

}

</script>

</body>
</html>
