<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | BIKIzz Classes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #0a1128 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: #fff; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 16px; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h2 { font-size: 26px; margin-bottom: 25px; color: #00b4d8; font-weight: 600; }
        .flash-messages { margin-bottom: 20px; text-align: left; }
        .flash { padding: 12px 15px; border-radius: 8px; font-size: 14px; margin-bottom: 8px; font-weight: 500; display: flex; align-items: center; }
        .flash.success { background-color: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; color: #10b981; }
        .flash.error { background-color: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #f87171; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px; }
        input { width: 100%; padding: 14px 16px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #fff; font-size: 15px; transition: all 0.3s ease; }
        input:focus { outline: none; border-color: #00b4d8; box-shadow: 0 0 10px rgba(0, 180, 216, 0.3); }
        .btn { width: 100%; padding: 14px; background: linear-gradient(90deg, #00b4d8, #0077b6); border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 180, 216, 0.4); margin-top: 10px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 180, 216, 0.6); }
        .btn:active { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="card">
        <h2>Create New Password</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-messages">
              {% for category, message in messages %}
                <div class="flash {% if category == 'success' or 'Successfully' in message %}success{% else %}error{% endif %}">
                  {{ message }}
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form action="/reset-password" methods="POST">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="password" placeholder="Enter new password" required>
            </div>
            
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Confirm new password" required>
            </div>

            <button type="submit" class="btn">Reset Password</button>
        </form>
    </div>

</body>
</html>
