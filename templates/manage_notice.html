<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>

<div class="sidebar">
    <div class="admin-logo">
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo-img">
        <h2>BIKIzz Admin</h2>
    </div>
    <a href="/admin">🏠 Dashboard</a>
    <a href="/students">👨 Students</a>
    <a href="/payments">💳 Payments</a>
    <a href="/live-class">🎥 Live Class</a>
    <a href="/upload-notes">📚 Notes</a>
    <a href="/manage-test">📝 Test</a>
    <a href="/manage-notice" class="active">📢 Notice</a>
    <a href="/admin-logout">🚪 Logout</a>
</div>

<div class="content">
    <div class="notice-container">
        <h1>📢 Notice Management</h1>
        <p class="subtitle">Create and publish official notices for the student dashboard.</p>
        
        <form action="/add-notice" method="POST" class="notice-form">
            <div class="form-group">
                <label for="notice_title">Notice Title</label>
                <input type="text" id="notice_title" name="title" placeholder="e.g., Live Class Rescheduled" required>
            </div>

            <div class="form-group">
                <label for="notice_date">Publish Date</label>
                <input type="date" id="notice_date" name="date" required>
            </div>
            
            <div class="form-group">
                <label for="notice_desc">Notice Description</label>
                <textarea id="notice_desc" name="message" rows="6" placeholder="Type the complete notice details here..." required></textarea>
            </div>
            
            <button type="submit" class="submit-notice-btn">Add & Publish Notice</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('notice_date').valueAsDate = new Date();
</script>

</body>
</html>
