<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BIKIzz' Classes</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="serif or sans-serif" rel="stylesheet">

    <style>
        .flash-messages {
            width: 100%;
            margin-bottom: 15px;
            text-align: left;
        }
        .flash {
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 10px;
            font-weight: 500;
            display: block;
        }
        /* Galat password/Email ke liye Red Card */
        .flash.error {
            background-color: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            color: #f87171;
        }
        /* Registration/Password Reset Success ke liye Green Card */
        .flash.success {
            background-color: rgba(16, 185, 129, 0.15);
            border: 1px solid #10b981;
            color: #10b981;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">
        <h2>Student Login</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-messages">
              {% for message in messages %}
                <div class="flash {% if 'Successful' in message or 'Success' in message or 'Please Login' in message %}success{% else %}error{% endif %}">
                  {{ message }}
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            
            <button type="submit">Login</button>
            
            <p>
                <a href="{{ url_for('student.forgot_password') }}">
                    Forgot Password?
                </a>
            </p>
        </form>

        <p>New Student? <a href="/register">Register</a></p>
    </div>
</div>

</body>
</html>
