<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BIKIzz Classes</title>
    {% include 'pwa_head.html' %}
    
    <!-- CSS and Fonts -->
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<div class="login-wrapper">
    <!-- Right Side: Translucent Glassmorphism Login Card -->
    <div class="form-container">
        <div class="login-card">
<img src="{{ url_for('static', filename='images/logo.png') }}" class="card-logo" alt="Logo">
            <h2>Welcome Back 👋</h2>
            <p class="subtitle">Login to continue your learning journey.</p>

            <!-- Flask Flash Messages -->
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="flash-messages">
                {% for message in messages %}
                <div class="flash {% if 'Successful' in message or 'Success' in message or 'Please Login' in message %}success{% else %}error{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <!-- Login Form -->
            <form action="/login" method="POST">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>

                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <span class="toggle-password" style="cursor: pointer;">
                        <i class="fa-solid fa-eye-slash" id="eyeIcon"></i>
                    </span>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span id="btnText">Login</span>
                    <span id="btnLoader" style="display:none;">
                        <i class="fa-solid fa-spinner fa-spin"></i> Logging in...
                    </span>
                </button>
            </form>

            <!-- Links -->
            <div class="links">
                <a href="{{ url_for('student.forgot_password') }}">Forgot Password?</a>
                <a href="/register">Create Account</a>
            </div>
        </div>
    </div>
</div>

<!-- Animated Background Elements -->
<div class="floating-bg">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="cursor-glow"></div>

<!-- JavaScript File -->
<script src="{{ url_for('static', filename='auth.js') }}"></script>

</body>
</html>
